<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AGUS — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal-1:#07897a;--teal-2:#1aaa94;--teal-3:#5dd5c0;--navy:#0d4f6c;--navy-2:#083d55;
  --orange:#f48c3a;--yellow:#f5c842;--white:#ffffff;--bg:#eef4f6;--card:#ffffff;
  --txt-h:#1a2e35;--txt-b:#4a6572;--txt-l:#8aa5af;--bdr:#dde8ec;--radius:14px;
  --shadow:0 4px 24px rgba(10,100,90,.10);--danger:#e05555;--warn-col:#f48c3a;
}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
#loginPage{display:flex;height:100vh;width:100vw;position:relative;overflow:hidden;z-index:10;background:var(--white);}
.lp-left{position:relative;width:58%;overflow:hidden;background:linear-gradient(150deg,#0ba897 0%,#0a7c6e 35%,#0a5e74 68%,#083d55 100%);display:flex;flex-direction:column;justify-content:center;padding:56px 64px;}
.lp-left .wave-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-radial-gradient(circle at 50% 50%,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0) 25%);background-size:200% 200%;animation:wave 30s ease infinite;pointer-events:none;}
@keyframes wave{0%{background-position:0% 0%;}25%{background-position:50% 30%;}50%{background-position:100% 60%;}75%{background-position:50% 90%;}100%{background-position:0% 0%;}}
.circuit-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.circuit-overlay svg{width:100%;height:100%;display:block;}
.pressure-scale{position:absolute;top:0;right:0;width:60px;height:100%;background:rgba(0,0,0,0.2);backdrop-filter:blur(4px);border-left:2px solid rgba(255,255,255,0.3);display:flex;flex-direction:column;justify-content:space-between;padding:20px 0;z-index:5;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,0.8);font-size:12px;font-weight:600;text-align:right;padding-right:10px;box-shadow:inset 0 0 20px rgba(0,0,0,0.2);background:repeating-linear-gradient(to bottom,rgba(255,255,255,0.1) 0%,rgba(255,255,255,0.1) 2px,transparent 2px,transparent 10%);}
.scale-labels{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:15px 0;pointer-events:none;}
.scale-labels span{display:block;text-align:right;padding-right:15px;color:white;font-weight:600;text-shadow:0 0 5px black;font-size:11px;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0.3;}}
.blink{animation:blink 1s infinite;}
.delay1{animation-delay:0s;}.delay2{animation-delay:0.2s;}.delay3{animation-delay:0.5s;}.delay4{animation-delay:0.8s;}.delay5{animation-delay:1.2s;}
@keyframes pulse-ring{0%{r:2;opacity:0.8;}100%{r:12;opacity:0;}}
.pulse{animation:pulse-ring 2s infinite;}
@keyframes dash{to{stroke-dashoffset:-100;}}
.graph-line{stroke-dasharray:10 15;animation:dash 20s linear infinite;}
.lp-content{position:relative;z-index:2;max-width:600px;color:white;}
.hover-menu{display:flex;flex-direction:row;gap:35px;margin-bottom:30px;}
.menu-item{background:#fff;padding:16px 28px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.15);cursor:pointer;font-weight:bold;color:#0072CE;font-size:1.3rem;transition:transform 0.3s ease,background 0.3s ease;}
.menu-item:hover,.menu-item.active{transform:translateY(-2px);background:#e6f0ff;}
#display-panel{background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);padding:25px 30px;border-radius:12px;color:#004080;line-height:2;font-size:1.2rem;transition:background 0.3s ease,box-shadow 0.3s ease;}
.lp-right{width:42%;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;position:relative;overflow:hidden;text-align:center;}
.water-drop-bg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:80%;opacity:1;pointer-events:none;z-index:1;}
.lp-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:34px;z-index:5;}
.lp-logo-icon{width:66px;height:66px;margin-bottom:11px;}
.lp-logo-name{font-family:'Syne',sans-serif;font-size:2.3rem;font-weight:800;color:var(--teal-1);letter-spacing:1.5px;}
.lp-form{width:100%;max-width:340px;z-index:5;margin:0 auto;}
.fg{position:relative;margin-bottom:16px;}
.fg .fi{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt-l);display:flex;}
.fg .fi svg{width:18px;height:18px;}
.fg input{width:100%;padding:14px 16px 14px 42px;border:1.5px solid var(--bdr);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--txt-h);background:#f9fbfc;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;box-sizing:border-box;}
.fg input:focus{border-color:var(--teal-2);box-shadow:0 0 0 4px rgba(26,170,148,.12);background:#fff;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--txt-l);display:flex;}
.btn-login{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,var(--teal-2),var(--navy));color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.5px;cursor:pointer;box-shadow:0 4px 18px rgba(13,79,108,.26);transition:opacity .2s,transform .15s,box-shadow .2s;box-sizing:border-box;}
.btn-login:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 8px 28px rgba(13,79,108,.4);}
#loginSpinner{display:none;width:28px;height:28px;border:3px solid rgba(26,170,148,0.2);border-top-color:var(--teal-2);border-radius:50%;margin:12px auto 0;animation:loginSpin 0.7s linear infinite;}
@keyframes loginSpin{to{transform:rotate(360deg)}}
#loginErr{margin-top:14px;padding:9px 13px;background:#fff0f0;border-left:3px solid var(--danger);border-radius:8px;color:#c0392b;font-size:.84rem;display:none;text-align:center;}
.lp-byline{z-index:5;position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:.85rem;color:var(--txt-l);}
.lp-waves{position:absolute;bottom:0;left:0;width:100%;height:200px;pointer-events:none;z-index:1;overflow:hidden;}
.lp-wave{position:absolute;bottom:0;left:0;width:200%;height:100%;}
.lp-wave-1{animation:waveMove 8s linear infinite;}
.lp-wave-2{animation:waveMove 12s linear infinite reverse;bottom:10px;}
.lp-wave-3{animation:waveMove 6s linear infinite;bottom:5px;opacity:0.6;}
@keyframes waveMove{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.lp-byline strong{color:var(--teal-1);font-weight:600;}
body{margin:0;font-family:'DM Sans','Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#000;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
@media(max-width:768px){
  #loginPage{flex-direction:column!important;overflow-y:auto!important;}
  .lp-left{width:100%!important;min-height:200px!important;padding:20px 18px!important;}
  .lp-left h2{font-size:1.45rem!important;margin-bottom:16px!important;}
  .hover-menu{flex-wrap:wrap!important;gap:8px!important;margin-bottom:16px!important;}
  .menu-item{font-size:0.9rem!important;padding:9px 13px!important;}
  #display-panel{font-size:1rem!important;padding:16px 18px!important;}
  .lp-right{width:100%!important;padding:28px 20px 36px!important;}
  .lp-form{max-width:100%!important;}
  .pressure-scale{display:none!important;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="loginPage">
  <div class="lp-left">
    <div class="wave-bg"></div>
    <div class="circuit-overlay">
      <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
        <path d="M100 100 L300 100 L300 250 L500 250" stroke="rgba(90,210,200,0.25)" stroke-width="2" fill="none" stroke-dasharray="8 6"/>
        <path d="M200 400 L400 400 L400 200 L600 200" stroke="rgba(244,140,58,0.2)" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
        <path d="M50 500 L250 500 L250 350 L450 350 L450 500" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
        <path d="M600 100 L700 200 L650 300 L750 400" stroke="rgba(90,210,200,0.3)" stroke-width="2" fill="none" class="graph-line"/>
        <circle cx="150" cy="150" r="4" fill="#fff" class="blink delay1"/>
        <circle cx="320" cy="220" r="3" fill="#ffaa00" class="blink delay2"/>
        <circle cx="420" cy="180" r="4" fill="#00ffaa" class="blink delay3"/>
        <circle cx="520" cy="280" r="3" fill="#ff66aa" class="blink delay4"/>
        <circle cx="220" cy="420" r="4" fill="#88ff88" class="blink delay5"/>
        <circle cx="580" cy="380" r="3" fill="#ffaa00" class="blink delay2"/>
        <circle cx="300" cy="300" r="5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" class="pulse"/>
        <circle cx="500" cy="200" r="5" stroke="rgba(90,210,200,0.6)" stroke-width="1.5" fill="none" class="pulse" style="animation-delay:0.5s"/>
        <circle cx="700" cy="450" r="5" stroke="rgba(244,140,58,0.6)" stroke-width="1.5" fill="none" class="pulse" style="animation-delay:1s"/>
        <rect x="50" y="50" width="6" height="20" fill="rgba(90,210,200,0.3)"/>
        <rect x="60" y="40" width="6" height="30" fill="rgba(90,210,200,0.3)"/>
        <rect x="70" y="30" width="6" height="40" fill="rgba(90,210,200,0.3)"/>
        <rect x="80" y="25" width="6" height="45" fill="rgba(90,210,200,0.3)"/>
        <rect x="90" y="35" width="6" height="35" fill="rgba(90,210,200,0.3)"/>
      </svg>
    </div>
    <div class="pressure-scale">
      <div class="scale-labels">
        <span>500</span><span>450</span><span>400</span><span>350</span><span>300</span>
        <span>250</span><span>200</span><span>150</span><span>100</span><span>50</span><span>0</span>
      </div>
    </div>
    <div class="lp-content">
      <h2 style="font-size:2.4rem;margin-bottom:30px;color:white;">AGUS – Autonomous Groundwater Utility System</h2>
      <div class="hover-menu">
        <div class="menu-item active" data-content="system">SYSTEM OVERVIEW</div>
        <div class="menu-item" data-content="ai">AI CONTROL ENGINE</div>
        <div class="menu-item" data-content="key">KEY CAPABILITIES</div>
      </div>
      <div id="display-panel"></div>
    </div>
  </div>
    <div class="lp-right">
    <div class="lp-waves">
      <svg class="lp-wave lp-wave-1" viewBox="0 24 150 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="wave1" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g><use href="#wave1" x="48" y="0" fill="rgba(26,170,148,0.12)"/><use href="#wave1" x="48" y="4" fill="rgba(26,170,148,0.07)"/><use href="#wave1" x="48" y="8" fill="rgba(26,170,148,0.04)"/></g>
      </svg>
      <svg class="lp-wave lp-wave-2" viewBox="0 24 150 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="wave2" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g><use href="#wave2" x="48" y="0" fill="rgba(13,79,108,0.09)"/><use href="#wave2" x="48" y="5" fill="rgba(13,79,108,0.05)"/></g>
      </svg>
      <svg class="lp-wave lp-wave-3" viewBox="0 24 150 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs><path id="wave3" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g><use href="#wave3" x="48" y="0" fill="rgba(93,213,192,0.10)"/><use href="#wave3" x="48" y="6" fill="rgba(93,213,192,0.05)"/></g>
      </svg>
    </div>
<div class="water-drop-bg"></div>
    <div class="lp-logo">
      <div class="lp-logo-icon">
      <img src="FINAL LOGO DESIGN 2025 - Copy (1).png" alt="AGUS Logo" style="width:100%; height:100%; object-fit: contain; display: block;">
      </div>
      <div class="lp-logo-name">AGUS</div>
    </div>
    <div class="lp-form">
      <div class="fg">
        <span class="fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input type="text" id="username" placeholder="Username" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
      </div>
      <div class="fg">
        <span class="fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
        <span class="pw-toggle" onclick="togglePw()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
      </div>
      <button class="btn-login" onclick="login()">Log In</button>
      <div id="loginSpinner"></div>
      <div id="loginErr"></div>
    </div>
    <p class="lp-byline">by <strong>Jarynn Pump Automations 2021</strong></p>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbwaASrDinkCa1e3x37MtsTPJd5xmbj_FCpokwq6P9aZLogSJEj296FOZB02tilZAnv15g/exec';
var _API_TIMEOUT = 15000;
var _API_RETRY_DELAY = 2000;

function _fetchWithTimeout(url, timeoutMs) {
  timeoutMs = timeoutMs || _API_TIMEOUT;
  return new Promise(function(resolve, reject) {
    var timer = setTimeout(function() { reject(new Error('Request timed out')); }, timeoutMs);
    fetch(url).then(function(r) {
      clearTimeout(timer);
      if (!r.ok) { reject(new Error('HTTP ' + r.status)); return; }
      return r.json();
    }).then(function(data) { resolve(data); }).catch(function(e) {
      clearTimeout(timer);
      if (e.name === 'AbortError') reject(new Error('Request timed out'));
      else reject(e);
    });
  });
}
function _fetchWithRetry(url, timeoutMs) {
  return _fetchWithTimeout(url, timeoutMs).catch(function(err) {
    return new Promise(function(resolve, reject) {
      setTimeout(function() { _fetchWithTimeout(url, timeoutMs).then(resolve).catch(reject); }, _API_RETRY_DELAY);
    });
  });
}
function apiPost(action, data) {
  data = data || {}; data.action = action;
  var url = API_URL + '?' + Object.keys(data).map(function(k) {
    var v = data[k]; return encodeURIComponent(k) + '=' + encodeURIComponent(v == null ? '' : (typeof v === 'object' ? JSON.stringify(v) : v));
  }).join('&');
  return _fetchWithRetry(url);
}

function togglePw() {
  var i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
}

var displayPanel = document.getElementById('display-panel');
var menuContent = {
  system: 'AGUS is an AI-powered platform for potable water production and distribution. It integrates with wells, treatment plants, reservoirs, pumps, and pipelines.',
  ai: '<ul><li>Pump operations for energy efficiency and stable pressure</li><li>Valve settings and pressure zones</li><li>Reservoir and tank levels</li><li>Predictive adjustments based on demand patterns</li></ul>',
  key: '<ul><li><strong>Autonomous Operation:</strong> Runs 24/7 with minimal manual oversight</li><li><strong>Optimized Performance:</strong> Balances flow, pressure, and energy use</li><li><strong>Predictive Management:</strong> Anticipates demand to prevent shortages</li><li><strong>Water Safety:</strong> Continuous monitoring to ensure potable water quality</li></ul>'
};
displayPanel.innerHTML = menuContent.system;
document.querySelectorAll('.menu-item').forEach(function(item) {
  item.addEventListener('mouseenter', function() {
    document.querySelectorAll('.menu-item').forEach(function(i) { i.classList.remove('active'); });
    item.classList.add('active');
    displayPanel.innerHTML = menuContent[item.getAttribute('data-content')];
  });
});

var bgC = document.getElementById('bg-canvas'), bgCtx = bgC.getContext('2d');
var W = bgC.width = window.innerWidth, H = bgC.height = window.innerHeight;
var nodeCount = window.innerWidth < 600 ? 35 : 80;
var nodes = [];
for (var ni = 0; ni < nodeCount; ni++) nodes.push({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, r: 2+Math.random()*2 });
var mouse = { x: null, y: null, mx: 0, my: 0 }, _animPaused = false;
window.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
var _bgGrad = bgCtx.createLinearGradient(0,0,W,H); _bgGrad.addColorStop(0,'#f0f8ff'); _bgGrad.addColorStop(1,'#d0eaff');
bgCtx.lineCap = 'round';
function drawLinks() {
  var i, j, dx, dy, d, alpha, lw;
  for (i = 0; i < nodes.length; i++) for (j = i+1; j < nodes.length; j++) {
    dx = nodes[i].x-nodes[j].x; dy = nodes[i].y-nodes[j].y; d = Math.sqrt(dx*dx+dy*dy);
    if (d < 150 && d > 10) {
      alpha = 1 - d/150;
      lw = alpha * 1.2 + 0.3;
      bgCtx.strokeStyle = 'rgba(0,120,200,'+alpha.toFixed(3)+')';
      bgCtx.lineWidth = lw;
      bgCtx.beginPath(); bgCtx.moveTo(nodes[i].x,nodes[i].y); bgCtx.lineTo(nodes[j].x,nodes[j].y); bgCtx.stroke();
    }
  }
}
function animate() {
  if (_animPaused) { requestAnimationFrame(animate); return; }
  bgCtx.fillStyle = _bgGrad; bgCtx.fillRect(0,0,W,H);
  drawLinks();
  bgCtx.shadowColor = 'rgba(0,120,200,0.25)'; bgCtx.shadowBlur = 4;
  for (var ni2 = 0; ni2 < nodes.length; ni2++) {
    var n = nodes[ni2];
    n.x += n.vx; n.y += n.vy;
    if (n.x < -10 || n.x > W+10) n.vx *= -1; if (n.y < -10 || n.y > H+10) n.vy *= -1;
    if (mouse.x !== null) {
      var dx = n.x-mouse.x, dy = n.y-mouse.y, d = Math.sqrt(dx*dx+dy*dy);
      if (d < 120) { var a = Math.atan2(dy,dx), f = (120-d)*0.008; n.vx += Math.cos(a)*f; n.vy += Math.sin(a)*f; }
    }
    bgCtx.shadowBlur = n.r > 3 ? 6 : 3;
    bgCtx.fillStyle = 'rgba(0,120,200,0.8)'; bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2); bgCtx.fill();
    bgCtx.fillStyle = 'rgba(180,220,255,0.4)'; bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r*0.4,0,Math.PI*2); bgCtx.fill();
  }
  bgCtx.shadowBlur = 0; bgCtx.shadowColor = 'transparent';
  requestAnimationFrame(animate);
}
animate();
document.addEventListener('visibilitychange', function() { _animPaused = document.hidden; if (!document.hidden) { _bgGrad = bgCtx.createLinearGradient(0,0,W,H); _bgGrad.addColorStop(0,'#f0f8ff'); _bgGrad.addColorStop(1,'#d0eaff'); } });
window.addEventListener('resize', function() { W = bgC.width = window.innerWidth; H = bgC.height = window.innerHeight; _bgGrad = bgCtx.createLinearGradient(0,0,W,H); _bgGrad.addColorStop(0,'#f0f8ff'); _bgGrad.addColorStop(1,'#d0eaff'); });

function login() {
  var user = document.getElementById('username').value.trim();
  var pass = document.getElementById('password').value;
  var errEl = document.getElementById('loginErr');
  var spinEl = document.getElementById('loginSpinner');
  errEl.style.display = 'none';
  if (!user || !pass) { errEl.innerText = 'Enter your username and password.'; errEl.style.display = 'block'; return; }
  spinEl.style.display = 'block';
  apiPost('checkLogin', {user: user, pass: pass})
    .then(function(token) {
      if (!token) { spinEl.style.display = 'none'; errEl.innerText = 'Invalid credentials. Please try again.'; errEl.style.display = 'block'; return; }
      localStorage.setItem('agusToken', token);
      localStorage.setItem('agusUser', user);
      window.location.href = 'index%20(4).html';
    })
    .catch(function(err) {
      spinEl.style.display = 'none';
      errEl.innerText = 'Login failed. Check your API_URL in the code or try again.';
      errEl.style.display = 'block';
      console.error('Login error:', err);
    });
}
</script>
</body>
</html>
